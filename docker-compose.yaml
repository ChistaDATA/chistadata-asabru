# ─────────────────────────────────────────────────────────────────────────────
# docker-compose.yaml — Chista Asabru development / integration stack
#
# Security practices
# ──────────────────
# • Credentials are read from environment variables (set them in .env or via
#   your secrets manager — never hard-code passwords in this file).
# • Copy .env.sample to .env and fill in the required values before running.
# • Containers that do not need network access are isolated on a dedicated
#   backend network.
#
# Usage
#   cp .env.sample .env   # fill in secrets
#   docker compose up -d
# ─────────────────────────────────────────────────────────────────────────────
version: "3.8"

# ─────────────────────────────────────────────────────────────────────────────
# Services
# ─────────────────────────────────────────────────────────────────────────────
services:

  # ── ClickHouse node 1 (primary) ──────────────────────────────────────────
  clickhouse-1:
    image: clickhouse/clickhouse-server:23.11
    restart: unless-stopped
    environment:
      CLICKHOUSE_DB:                        default
      CLICKHOUSE_USER:                      ${CLICKHOUSE_USER:-default}
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
      CLICKHOUSE_PASSWORD:                  ${CLICKHOUSE_PASSWORD:?CLICKHOUSE_PASSWORD must be set}
    ports:
      - "9000:9000"
      - "8123:8123"
    volumes:
      - ./external/clickhouse-1/config.xml:/etc/clickhouse-server/config.xml:ro
      - ./external/clickhouse-1/init-db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
      interval: 30s
      timeout: 5s
      retries: 5
    networks:
      - backend

  # ── ClickHouse node 2 (for log ingestion via Fluent Bit) ─────────────────
  clickhouse-2:
    image: clickhouse/clickhouse-server:23.11
    restart: unless-stopped
    environment:
      CLICKHOUSE_DB:                        fluentbit
      CLICKHOUSE_USER:                      ${CLICKHOUSE_2_USER:-fluentbit}
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
      CLICKHOUSE_PASSWORD:                  ${CLICKHOUSE_2_PASSWORD:?CLICKHOUSE_2_PASSWORD must be set}
    ports:
      - "8124:8123"
    volumes:
      - ./external/clickhouse-2/init-db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - backend

  # ── PostgreSQL ────────────────────────────────────────────────────────────
  postgres-1:
    image: postgres:16
    restart: unless-stopped
    command:
      - -c
      - shared_preload_libraries=pg_stat_statements
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      PGDATA:            /var/lib/postgresql/data/pgdata
    volumes:
      - source: ./external/postgres
        target: /docker-entrypoint-initdb.d
        type:   bind
        read_only: true
      - source: pg_data
        target: /var/lib/postgresql/data
        type:   volume
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 30s
      timeout: 5s
      retries: 5
    networks:
      - backend

  # ── PostgreSQL Prometheus exporter ───────────────────────────────────────
  postgres-exporter:
    image: quay.io/prometheuscommunity/postgres-exporter:latest
    restart: unless-stopped
    command: >
      --config.file="/tmp/postgres_exporter.yml"
    ports:
      - "9187:9187"
    volumes:
      - ./external/postgres-exporter/postgres_exporter.yml:/tmp/postgres_exporter.yml:ro
    environment:
      DATA_SOURCE_NAME: "postgresql://postgres:${POSTGRES_PASSWORD}@postgres-1:5432/postgres?sslmode=disable"
    depends_on:
      postgres-1:
        condition: service_healthy
    networks:
      - backend

  # ── Fluent Bit (log aggregator) ───────────────────────────────────────────
  fluent-bit:
    image: fluent/fluent-bit:latest
    restart: unless-stopped
    volumes:
      - ./external/fluent-bit/functions.lua:/fluent-bit/scripts/functions.lua:ro
      - ./external/fluent-bit/fluent-bit.conf:/fluent-bit/etc/fluent-bit.conf:ro
      - ./external/fluent-bit/parser.conf:/fluent-bit/etc/parser.conf:ro
    ports:
      - "5170:5170"
    depends_on:
      clickhouse-1:
        condition: service_healthy
    networks:
      - backend

  # ── Prometheus ────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"
    ports:
      - "9090:9090"
    volumes:
      - ./external/prometheus:/etc/prometheus:ro
      - prom_data:/prometheus
    networks:
      - backend

  # ── Grafana ───────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER:                  ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD:              ${GRAFANA_ADMIN_PASSWORD:?GRAFANA_ADMIN_PASSWORD must be set}
      GF_AUTH_ANONYMOUS_ENABLED:               "false"
      GF_INSTALL_PLUGINS:                      grafana-clickhouse-datasource
      GF_PLUGINS_ALLOW_LOADING_UNSIGNED_PLUGINS: michelin-snowflake-datasource
      GF_SECURITY_DISABLE_GRAVATAR:            "true"
      GF_ANALYTICS_REPORTING_ENABLED:         "false"
    volumes:
      - source: ./external/grafana/provisioning
        target: /etc/grafana/provisioning
        type:   bind
        read_only: true
      - source: ./external/grafana/dashboards
        target: /var/lib/grafana/dashboards
        type:   bind
        read_only: true
      - source: ./external/grafana/plugins
        target: /var/lib/grafana/plugins
        type:   bind
    depends_on:
      - prometheus
    networks:
      - backend

  # ── MongoDB (for session storage / auxiliary data) ────────────────────────
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:-root}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:?MONGO_ROOT_PASSWORD must be set}
    volumes:
      - mongo_data:/data/db
    networks:
      - backend

  # ── MySQL (Rundeck backing store) ─────────────────────────────────────────
  mysql:
    image: mysql:8
    container_name: mysql
    restart: unless-stopped
    cap_add:
      - SYS_NICE
    expose:
      - 3306
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD must be set}
      MYSQL_DATABASE:      rundeck
      MYSQL_USER:          rundeck
      MYSQL_PASSWORD:      ${MYSQL_RUNDECK_PASSWORD:?MYSQL_RUNDECK_PASSWORD must be set}
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - backend

# ─────────────────────────────────────────────────────────────────────────────
# Named volumes
# ─────────────────────────────────────────────────────────────────────────────
volumes:
  pg_data:
  mysql_data:
  mongo_data:
  prom_data:
  grafana_storage:

# ─────────────────────────────────────────────────────────────────────────────
# Networks
# ─────────────────────────────────────────────────────────────────────────────
networks:
  backend:
    driver: bridge
    driver_opts:
      com.docker.network.driver.mtu: 1400
