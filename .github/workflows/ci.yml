# ─────────────────────────────────────────────────────────────────────────────
# CI pipeline — Chista Asabru
#
# Jobs
# ────
#  lint          Static analysis (cppcheck + clang-tidy)
#  build-test    Compile + unit tests (Ubuntu 24.04)
#  docker        Build & scan the Docker image (Trivy)
# ─────────────────────────────────────────────────────────────────────────────
name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  # Allow manual trigger from the Actions tab.
  workflow_dispatch:

# Prevent duplicate runs on PRs from the same repo.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

env:
  # Consistent build type across all jobs.
  CMAKE_BUILD_TYPE: Release

# ─────────────────────────────────────────────────────────────────────────────
jobs:
  # ── 1. Lint ────────────────────────────────────────────────────────────────
  lint:
    name: Static analysis
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install analysis tools
        run: |
          sudo apt-get update -y
          sudo apt-get install -y --no-install-recommends \
            cppcheck clang-tidy cmake ninja-build \
            libssl-dev libsqlite3-dev libuv1-dev libcurl4-openssl-dev \
            python3-dev

      - name: cppcheck
        run: |
          cppcheck --enable=all --error-exitcode=1 \
            --suppress=missingIncludeSystem \
            --suppress=unusedFunction \
            -I src/ src/ 2>&1 | tee cppcheck-report.txt
          if grep -q "error:" cppcheck-report.txt; then
            echo "cppcheck found errors"
            exit 1
          fi

      - name: Configure (for compile_commands.json)
        run: |
          cmake -S . -B build-lint \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
            -DASABRU_COMMONS_BUILD=LOCAL_DIR \
            -DASABRU_ENGINE_BUILD=LOCAL_DIR  \
            -DASABRU_PARSERS_BUILD=LOCAL_DIR \
            -DGTEST_ENABLED=OFF

      - name: clang-tidy
        run: |
          # Run clang-tidy only on files we own (exclude third-party CPM fetched headers)
          find src -name '*.cpp' -print0 | xargs -0 clang-tidy \
            -p build-lint \
            --warnings-as-errors='*' \
            -- || true   # clang-tidy is advisory; hard errors come from cppcheck

  # ── 2. Build & test ────────────────────────────────────────────────────────
  build-test:
    name: Build & unit tests
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Cache CPM packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/CPM
          key: cpm-${{ hashFiles('**/CMakeLists.txt') }}
          restore-keys: cpm-

      - name: Install build dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake ninja-build \
            libssl-dev libsqlite3-dev libuv1-dev libcurl4-openssl-dev \
            python3-dev nodejs npm gcov

      - name: Build sub-libraries
        run: |
          chmod +x ./build_libs.sh
          ./build_libs.sh

      - name: Configure
        run: |
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=${{ env.CMAKE_BUILD_TYPE }} \
            -DASABRU_COMMONS_BUILD=LOCAL_DIR \
            -DASABRU_ENGINE_BUILD=LOCAL_DIR  \
            -DASABRU_PARSERS_BUILD=LOCAL_DIR \
            -DGTEST_ENABLED=ON              \
            -DENABLE_COVERAGE=OFF

      - name: Build
        run: cmake --build build --parallel "$(nproc)"

      - name: Run unit tests
        run: |
          cd build
          ctest --output-on-failure --timeout 60

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: build/Testing/

  # ── 3. Docker build + security scan ───────────────────────────────────────
  docker:
    name: Docker build & Trivy scan
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    # Only run on pushes to main/develop (not every PR) to save runner minutes.
    if: github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          tags: chista-asabru:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: chista-asabru:ci-${{ github.sha }}
          format: table
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'
